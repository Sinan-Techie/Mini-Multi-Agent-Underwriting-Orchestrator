<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Agent Orchestrator — Test Client</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .note { font-size: 13px; color: #6e6e73; margin-bottom: 8px; }

    .panel {
      background: #fff;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      padding: 14px;
    }

    .connection-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .connection-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .url-row label { font-size: 13px; color: #6e6e73; }
    .url-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #0071e3;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #0077ed; }
    button:disabled {
      background: #c7c7cc;
      cursor: not-allowed;
    }
    button.secondary {
      background: #e5e5ea;
      color: #1d1d1f;
    }
    button.secondary:hover { background: #d8d8dd; }

    .status {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status.disconnected { background: #ffeced; color: #b3261e; }
    .status.connecting { background: #fff4e5; color: #995500; }
    .status.connected { background: #e6f4ea; color: #1e7b34; }

    .user-info {
      font-size: 12px;
      color: #6e6e73;
      margin-left: auto;
    }

    .current-node {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: #e8efff;
      color: #1742a8;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .messages {
      min-height: 360px;
      max-height: 520px;
      overflow-y: auto;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      padding: 10px 12px;
      border-radius: 8px;
      max-width: 85%;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.45;
    }
    .msg.user {
      align-self: flex-end;
      background: #0071e3;
      color: white;
    }
    .msg.bot {
      align-self: flex-start;
      background: #e5e5ea;
      color: #1d1d1f;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #6e6e73;
      font-size: 12px;
      font-style: italic;
      padding: 4px 8px;
    }
    .msg.node {
      align-self: center;
      background: #e8efff;
      color: #1742a8;
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .msg.error {
      align-self: center;
      background: #ffeced;
      color: #b3261e;
      font-size: 13px;
    }
    .msg .agent-tag {
      display: block;
      font-size: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #6e6e73;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .msg .streaming-cursor {
      display: inline-block;
      width: 6px;
      height: 14px;
      background: currentColor;
      opacity: 0.6;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 0.6; }
      50.01%, 100% { opacity: 0; }
    }

    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 14px;
    }

    .log {
      margin-top: 6px;
      max-height: 220px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      background: #1d1d1f;
      color: #a8d1ff;
      padding: 10px;
      border-radius: 6px;
    }
    .log .send { color: #f0a365; }
    .log .recv { color: #7ec699; }
    .log .warn { color: #ff8b8b; }
    .log .meta { color: #8e8e93; }

    details summary {
      cursor: pointer;
      font-size: 13px;
      color: #6e6e73;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <h1>Multi-Agent Orchestrator — Test Client</h1>
      <div class="note">Paste a JWT from <code>mint_tokens.py</code>, click Connect, then walk through the flow.</div>
    </div>

    <div class="panel">
      <div class="url-row">
        <label>WebSocket URL:</label>
        <input id="wsUrl" value="ws://localhost:8000/ws/chat" />
      </div>
      <div class="connection-row">
        <input id="token" placeholder="Paste JWT here (from mint_tokens.py)…" />
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" class="secondary" disabled>Disconnect</button>
      </div>
      <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <span id="status" class="status disconnected">disconnected</span>
        <span id="currentNode" class="current-node" style="display:none;"></span>
        <span id="userInfo" class="user-info"></span>
      </div>
    </div>

    <div class="panel">
      <div id="messages" class="messages"></div>
      <div class="input-row" style="margin-top: 10px;">
        <input id="messageInput" placeholder="Type a message and press Enter…" disabled />
        <button id="sendBtn" disabled>Send</button>
      </div>
    </div>

    <details class="panel">
      <summary>Raw WebSocket log (for debugging)</summary>
      <div id="log" class="log"></div>
    </details>
  </div>

  <script>
    const els = {
      wsUrl: document.getElementById("wsUrl"),
      token: document.getElementById("token"),
      connectBtn: document.getElementById("connectBtn"),
      disconnectBtn: document.getElementById("disconnectBtn"),
      status: document.getElementById("status"),
      currentNode: document.getElementById("currentNode"),
      userInfo: document.getElementById("userInfo"),
      messages: document.getElementById("messages"),
      messageInput: document.getElementById("messageInput"),
      sendBtn: document.getElementById("sendBtn"),
      log: document.getElementById("log"),
    };

    let ws = null;
    let currentBotMsg = null;     // DOM element of the currently streaming bot bubble
    let currentNodeName = null;   // most recent node name from a `node` event

    function setStatus(state, text) {
      els.status.className = "status " + state;
      els.status.textContent = text;
    }

    function setConnected(connected, user) {
      els.connectBtn.disabled = connected;
      els.disconnectBtn.disabled = !connected;
      els.messageInput.disabled = !connected;
      els.sendBtn.disabled = !connected;
      els.userInfo.textContent = user
        ? `signed in as ${user.user_id || user.sub || "?"} · role=${user.role} · session=${(user.session_id || "").slice(0, 8)}`
        : "";
      if (!connected) {
        els.currentNode.style.display = "none";
        els.currentNode.textContent = "";
        currentNodeName = null;
      }
    }

    function setCurrentNode(name) {
      currentNodeName = name;
      els.currentNode.style.display = "inline-block";
      els.currentNode.textContent = "node: " + name;
    }

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = content;
      els.messages.appendChild(div);
      els.messages.scrollTop = els.messages.scrollHeight;
      return div;
    }

    function addBotBubble(nodeName) {
      const div = document.createElement("div");
      div.className = "msg bot";
      if (nodeName) {
        const tag = document.createElement("span");
        tag.className = "agent-tag";
        tag.textContent = nodeName;
        div.appendChild(tag);
      }
      els.messages.appendChild(div);
      const cursor = document.createElement("span");
      cursor.className = "streaming-cursor";
      div.appendChild(cursor);
      els.messages.scrollTop = els.messages.scrollHeight;
      return div;
    }

    function logLine(kind, text) {
      const line = document.createElement("div");
      line.className = kind;
      const ts = new Date().toTimeString().split(" ")[0];
      line.textContent = `[${ts}] ${text}`;
      els.log.appendChild(line);
      els.log.scrollTop = els.log.scrollHeight;
    }

    function connect() {
      const url = els.wsUrl.value.trim();
      const token = els.token.value.trim();
      if (!token) {
        addMessage("error", "Paste a JWT token first.");
        return;
      }
      setStatus("connecting", "connecting…");
      logLine("meta", `connecting to ${url}`);

      try {
        ws = new WebSocket(url);
      } catch (e) {
        addMessage("error", "Invalid WebSocket URL: " + e.message);
        setStatus("disconnected", "disconnected");
        return;
      }

      ws.onopen = () => {
        logLine("meta", "socket open — sending auth");
        const authMsg = { type: "auth", token };
        ws.send(JSON.stringify(authMsg));
        logLine("send", JSON.stringify(authMsg));
      };

      ws.onmessage = (event) => {
        logLine("recv", event.data);
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          addMessage("error", "Server sent non-JSON: " + event.data);
          return;
        }
        handleServerMessage(data);
      };

      ws.onerror = () => {
        logLine("warn", "socket error");
        addMessage("error", "WebSocket error — is the server running?");
      };

      ws.onclose = (event) => {
        logLine("meta", `socket closed (code=${event.code})`);
        setStatus("disconnected", "disconnected");
        setConnected(false);
        ws = null;
        if (currentBotMsg) {
          currentBotMsg.querySelector(".streaming-cursor")?.remove();
          currentBotMsg = null;
        }
      };
    }

    function handleServerMessage(data) {
      switch (data.type) {
        case "auth_success":
          setStatus("connected", "connected");
          setConnected(true, data);
          addMessage("system", `authenticated — role: ${data.role}`);
          break;

        case "auth_failed":
          addMessage("error", "auth failed: " + (data.message || "unknown"));
          if (ws) ws.close();
          break;

        case "node":
          setCurrentNode(data.name || "?");
          // Close any currently streaming bubble — a new node owns the next stream.
          if (currentBotMsg) {
            currentBotMsg.querySelector(".streaming-cursor")?.remove();
            currentBotMsg = null;
          }
          // Also surface the transition inline so the user can see routing.
          addMessage("node", `→ ${data.name}`);
          break;

        case "stream":
          if (!currentBotMsg) {
            currentBotMsg = addBotBubble(currentNodeName);
          }
          // Insert text before the trailing cursor so it keeps blinking at the end.
          const cursor = currentBotMsg.querySelector(".streaming-cursor");
          const textNode = document.createTextNode(data.text || "");
          currentBotMsg.insertBefore(textNode, cursor);
          els.messages.scrollTop = els.messages.scrollHeight;
          break;

        case "done":
          if (currentBotMsg) {
            currentBotMsg.querySelector(".streaming-cursor")?.remove();
            currentBotMsg = null;
          }
          break;

        case "error":
          addMessage("error", "server error: " + (data.message || "unknown"));
          if (currentBotMsg) {
            currentBotMsg.querySelector(".streaming-cursor")?.remove();
            currentBotMsg = null;
          }
          break;

        default:
          // Ignore unknown message types but log them for debugging.
          logLine("warn", "unknown message type: " + data.type);
      }
    }

    function sendMessage() {
      const text = els.messageInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      addMessage("user", text);
      const msg = { type: "message", text };
      ws.send(JSON.stringify(msg));
      logLine("send", JSON.stringify(msg));
      els.messageInput.value = "";
    }

    function disconnect() {
      if (ws) ws.close();
    }

    els.connectBtn.addEventListener("click", connect);
    els.disconnectBtn.addEventListener("click", disconnect);
    els.sendBtn.addEventListener("click", sendMessage);
    els.messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
    els.token.addEventListener("keydown", (e) => {
      if (e.key === "Enter") connect();
    });
  </script>
</body>
</html>
